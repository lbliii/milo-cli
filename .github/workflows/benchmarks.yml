name: Benchmarks

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "benchmarks/**"
      - "pyproject.toml"

concurrency:
  group: benchmarks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmarks:
    name: pytest-benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14t"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run benchmarks
        env:
          CI: true
          PYTHON_GIL: "0"
        run: |
          uv run pytest benchmarks/ \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --benchmark-min-rounds=5 \
            -q

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results.json

      - name: Download baseline (if available)
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: benchmarks.yml
          branch: main
          name: benchmark-results-*
          path: baseline/
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Compare and comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find baseline file
          BASELINE=$(find baseline/ -name 'benchmark-results.json' -type f 2>/dev/null | head -1)

          if [ -z "$BASELINE" ]; then
            echo "No baseline found — skipping comparison"
            exit 0
          fi

          # Generate comparison summary
          python3 -c "
          import json, sys

          with open('$BASELINE') as f:
              base = {b['name']: b for b in json.load(f)['benchmarks']}
          with open('benchmark-results.json') as f:
              current = {b['name']: b for b in json.load(f)['benchmarks']}

          lines = ['## Benchmark Comparison', '', '| Benchmark | Baseline (median) | Current (median) | Change |', '|---|---|---|---|']
          regressions = []

          for name in sorted(current):
              cur = current[name]['stats']['median']
              if name in base:
                  prev = base[name]['stats']['median']
                  pct = ((cur - prev) / prev) * 100
                  arrow = '🔴' if pct > 20 else '🟡' if pct > 5 else '🟢'
                  lines.append(f'| \`{name.split(\"::\")[1] if \"::\" in name else name}\` | {prev:.1f}ns | {cur:.1f}ns | {arrow} {pct:+.1f}% |')
                  if pct > 20:
                      regressions.append(name)
              else:
                  lines.append(f'| \`{name.split(\"::\")[1] if \"::\" in name else name}\` | — | {cur:.1f}ns | 🆕 new |')

          if regressions:
              lines.extend(['', f'**⚠️ {len(regressions)} benchmark(s) regressed >20%**'])

          lines.extend(['', '_Comparison against latest main baseline_'])
          print('\n'.join(lines))
          " > comment-body.md

          if [ -s comment-body.md ]; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body-file comment-body.md \
              --edit-last 2>/dev/null || \
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body-file comment-body.md
          fi
