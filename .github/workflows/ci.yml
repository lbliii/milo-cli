name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14t"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        id: ruff-check
        run: |
          exit_code=0
          uv run ruff check src/ tests/ benchmarks/ --output-format=json > ruff-raw.json || exit_code=$?
          jq '{data: .}' ruff-raw.json > ruff-results.json
          if [ "$exit_code" -ne 0 ]; then
            echo "ruff_failed=true" >> "$GITHUB_ENV"
          fi

      - name: Lint summary
        if: always()
        uses: lbliii/kida@v0.3.2
        with:
          template: ruff
          data: ruff-results.json
          data-format: json
          post-to: step-summary

      - name: Fail on lint violations
        if: always() && env.ruff_failed == 'true'
        run: |
          echo "Ruff found lint violations. See the Lint summary step for details."
          exit 1

      - name: Ruff format check
        run: uv run ruff format src/ tests/ benchmarks/ --check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14t"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: ty check
        run: uv run ty check src/milo/

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      pull-requests: write
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.14t"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        env:
          CI: true
          PYTHON_GIL: "0"
        run: |
          uv run pytest tests/ -ra -q --maxfail=5 --tb=short \
            --cov=milo --cov-report=xml --cov-report=lcov --cov-fail-under=80 \
            --junit-xml=test-results.xml

      - name: Test summary
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14t'
        uses: lbliii/kida@v0.3.2
        with:
          template: pytest
          data: test-results.xml
          data-format: junit-xml
          post-to: step-summary

      - name: Coverage report
        if: always() && github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14t'
        uses: lbliii/kida@v0.3.2
        with:
          template: coverage
          data: coverage.lcov
          data-format: lcov
          post-to: pr-comment
          comment-header: coverage-report
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14t'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Verify GIL status (free-threaded only)
        if: matrix.python-version == '3.14t'
        run: uv run python -c "import sys; assert not sys._is_gil_enabled(), 'GIL should be disabled on 3.14t'"

  # Weekly / manual: full test pass with verbose coverage (mirrors kida slow-tests pattern)
  slow-tests:
    name: Full Test Suite
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14t"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run all tests with term coverage
        env:
          CI: true
          PYTHON_GIL: "0"
        run: |
          uv run pytest tests/ -v --tb=short --cov=milo --cov-report=term-missing --timeout=300
